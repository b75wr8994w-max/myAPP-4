];

// 每日隨機事件
const dailyEvents = [
  { text: "平穩防禦日：心無雜念，今日推進效率提升。", icon: "shield", getReward: () => dispatch('GAIN_EXP', 15) },
  { text: "市場雜訊測試：你選擇關閉交易所，成功守住防禦線。", icon: "ear-off", getReward: () => {} },
  { text: "意外之財：在舊錢包找到粉塵！", icon: "sparkles", getReward: () => dispatch('ADD_FRAGMENTS', 2) },
  { text: "神龜的注視：你的寵物似乎在為你加油。", icon: "bug", getReward: () => dispatch('GAIN_EXP', 20) }
];

const initialState = {
  meta: { lastLoginDate: '', streak: 0, exp: 0, level: 1, act: 1, fragments: 0, petLevel: 1, oathTaken: false },
  stats: { btc: 0.85, loanCurrent: 236, loanMax: 236, hpCurrent: 55, hpMax: 100, gold: 60 },
  questsData: {}
};

let state = null;
try {
  const saved = localStorage.getItem('paladin_hub_state');
  state = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(initialState));
} catch(e) { state = JSON.parse(JSON.stringify(initialState)); }

const vibrate = (ms) => { if(navigator.vibrate) navigator.vibrate(ms); };
const showToast = (msg) => {
  const c = document.getElementById('toast-container'); const el = document.createElement('div');
  el.className = 'toast'; el.innerText = msg; c.appendChild(el); setTimeout(() => el.remove(), 3000);
};

// ==========================================
// 引擎核心 (Dispatcher)
// ==========================================
function dispatch(action, payload) {
  let shouldRender = true;

  switch(action) {
    case 'LOGIN_CHECK':
      const today = new Date().toDateString();
      if(state.meta.lastLoginDate !== today) {
        state.meta.streak += 1;
        state.meta.lastLoginDate = today;
        state.meta.oathTaken = false;
        triggerDailyEvent();
      }
      break;

    case 'TAKE_OATH':
      state.meta.oathTaken = true;
      document.getElementById('oath-view').classList.add('hidden');
      document.getElementById('dashboard-view').classList.remove('hidden');
      break;

    case 'ADD_BTC':
      state.stats.btc = parseFloat((state.stats.btc + 0.05).toFixed(3));
      vibrate([50, 50]);
      document.getElementById('header-card').classList.add('flash-gold');
      setTimeout(() => document.getElementById('header-card').classList.remove('flash-gold'), 800);
      showToast('⚔️ 實體防禦力提升！入庫 +0.05 BTC');
      break;

    case 'PAY_LOAN':
      if (state.stats.loanCurrent > 0) {
        state.stats.loanCurrent -= 1; vibrate(30); showToast('🛡️ 負重減輕！信貸 -1萬');
      }
      break;

    case 'TOGGLE_QUEST':
      if(!state.questsData[payload]) state.questsData[payload] = { completed: false, subs: [] };
      state.questsData[payload].completed = !state.questsData[payload].completed;
      if(state.questsData[payload].completed) {
        vibrate(50); dispatch('GAIN_EXP', 50);
        if(Math.random() < 0.4) dispatch('ADD_FRAGMENTS', 1); // 40% 掉落碎片
      }
      break;

    case 'ADD_SUBQUEST':
      if(!state.questsData[payload.qId]) state.questsData[payload.qId] = { completed: false, subs: [] };
      state.questsData[payload.qId].subs.push({ id: Date.now(), text: payload.text, completed: false });
      break;

    case 'TOGGLE_SUBQUEST':
      const sq = state.questsData[payload.qId].subs.find(s => s.id === payload.sqId);
      if(sq) {
        sq.completed = !sq.completed;
        if(sq.completed) {
          vibrate(20); dispatch('GAIN_EXP', 15);
          if(Math.random() < 0.3) dispatch('ADD_FRAGMENTS', 1);
        }
      }
      break;

    case 'DELETE_SUBQUEST':
      if(state.questsData[payload.qId]) {
        state.questsData[payload.qId].subs = state.questsData[payload.qId].subs.filter(s => s.id !== payload.sqId);
      }
      break;

    case 'GAIN_EXP':
      state.meta.exp += payload; showToast(`🌟 獲得 ${payload} EXP`);
      const reqExp = state.meta.level * 100;
      if(state.meta.exp >= reqExp) {
        state.meta.level++; state.meta.exp -= reqExp;
        if(state.meta.level === 5) state.meta.petLevel = 2;
        if(state.meta.level === 15) state.meta.petLevel = 3;
        vibrate([100, 50, 100]); showToast(`🎉 升級啦！目前 Lv.${state.meta.level}`);
      }
      break;

    case 'ADD_FRAGMENTS':
      state.meta.fragments += payload; showToast(`🧩 掉落！BTC 碎片 x${payload}`);
      if(state.meta.fragments >= 10) {
        state.meta.fragments -= 10; state.stats.btc = parseFloat((state.stats.btc + 0.01).toFixed(3));
        showToast(`🔥 碎片融煉成功！BTC +0.01`);
        document.getElementById('header-card').classList.add('flash-gold');
      }
      break;

    case 'CHANGE_ACT':
      const newAct = state.meta.act + payload;
      if(newAct >= 1 && newAct <= acts.length) state.meta.act = newAct;
      break;
    
    case 'JUMP_ACT':
      state.meta.act = payload;
      break;

    case 'SAVE_SETTINGS':
      state.stats.btc = parseFloat(document.getElementById('in-btc').value) || 0;
      state.stats.loanCurrent = parseInt(document.getElementById('in-loanC').value) || 0;
      state.stats.loanMax = parseInt(document.getElementById('in-loanM').value) || 1;
      state.stats.hpCurrent = parseInt(document.getElementById('in-hpC').value) || 0;
      state.stats.hpMax = parseInt(document.getElementById('in-hpM').value) || 1;
      state.stats.gold = parseInt(document.getElementById('in-gold').value) || 0;
      closeSettings(); showToast('💾 防禦數值已校準並備份');
      break;

    case 'EXPORT_DATA':
      const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `Paladin_Hub_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
      shouldRender = false;
      break;
  }

  if(shouldRender) {
    localStorage.setItem('paladin_hub_state', JSON.stringify(state));
    render();
  }
}

// ==========================================
// 渲染與互動邏輯
// ==========================================
let pendingEventReward = null;

function triggerDailyEvent() {
  const evt = dailyEvents[Math.floor(Math.random() * dailyEvents.length)];
  document.getElementById('event-icon').setAttribute('data-lucide', evt.icon);
  document.getElementById('event-desc').innerText = evt.text;
  pendingEventReward = evt.getReward;
  lucide.createIcons();
  document.getElementById('event-modal').classList.remove('hidden');
}

function closeEventModal() {
  document.getElementById('event-modal').classList.add('hidden');
  if(pendingEventReward) { pendingEventReward(); pendingEventReward = null; }
}

function openSettings() {
  document.getElementById('in-btc').value = state.stats.btc;
  document.getElementById('in-loanC').value = state.stats.loanCurrent;
  document.getElementById('in-loanM').value = state.stats.loanMax;
  document.getElementById('in-hpC').value = state.stats.hpCurrent;
  document.getElementById('in-hpM').value = state.stats.hpMax;
  document.getElementById('in-gold').value = state.stats.gold;
  document.getElementById('settings-modal').classList.remove('hidden');
}

function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

function render() {
  // Header Info
  document.getElementById('header-level').innerText = `Lv.${state.meta.level}`;
  document.getElementById('btc-text').innerText = state.stats.btc.toFixed(3);
  document.getElementById('btc-bar').style.width = `${Math.min(100, (state.stats.btc/TARGET_BTC)*100)}%`;
  
  const expReq = state.meta.level * 100;
  document.getElementById('exp-bar').style.width = `${(state.meta.exp / expReq) * 100}%`;
  document.getElementById('exp-text').innerText = `EXP ${state.meta.exp} / ${expReq}`;

  // Stats
  document.getElementById('hp-text').innerText = `${state.stats.hpCurrent}/${state.stats.hpMax}`;
  document.getElementById('hp-bar').style.width = `${Math.min(100, (state.stats.hpCurrent/state.stats.hpMax)*100)}%`;
  document.getElementById('loan-text').innerText = `${state.stats.loanCurrent} / ${state.stats.loanMax}w`;
  document.getElementById('loan-bar').style.width = `${Math.min(100, (state.stats.loanCurrent/state.stats.loanMax)*100)}%`;
  document.getElementById('gold-text').innerText = `${state.stats.gold}w`;

  // Gamification
  document.getElementById('pet-name').innerText = `${petNames[state.meta.petLevel-1]} (Lv.${state.meta.petLevel})`;
  document.getElementById('frag-text').innerText = `${state.meta.fragments} / 10`;
  document.getElementById('streak-text').innerText = `${state.meta.streak} 天`;

  // Navigation (Desktop)
  document.getElementById('desktop-nav').innerHTML = acts.map(a => `
    <button onclick="dispatch('JUMP_ACT', ${a.id})" class="w-full text-left px-3 py-2 rounded text-sm transition-all border flex items-center justify-between ${state.meta.act === a.id ? 'bg-amber-900/30 text-amber-300 border-amber-600/50' : 'text-stone-500 border-transparent hover:text-stone-300 hover:bg-stone-800/50'}">
      <div><div class="font-bold">${a.title.split('：')[0]}</div></div>
    </button>
  `).join('');

  // Current Act
  const act = acts[state.meta.act - 1] || acts[0];
  document.getElementById('act-badge').innerText = `ACT ${act.id} / ${act.years}`;
  document.getElementById('act-title').innerText = act.title;
  document.getElementById('act-desc').innerText = act.desc;

  const renderList = (type, containerId) => {
    const html = act.quests.filter(q => q.type === type).map(q => {
      const qd = state.questsData[q.id] || { completed: false, subs: [] };
      const subHtml = qd.subs.map(sq => `
        <div class="flex items-start gap-2 mt-2 group">
          <input type="checkbox" onchange="dispatch('TOGGLE_SUBQUEST', {qId:'${q.id}', sqId:${sq.id}})" ${sq.completed ? 'checked' : ''} class="accent-amber-600 mt-0.5">
          <span class="text-xs ${sq.completed ? 'line-through text-stone-600' : 'text-stone-400'} flex-1 leading-relaxed">${sq.text}</span>
          <button onclick="dispatch('DELETE_SUBQUEST', {qId:'${q.id}', sqId:${sq.id}})" class="text-[10px] text-red-900 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
        </div>
      `).join('');

      return `
      <div class="bg-stone-950/60 p-3.5 rounded-lg border border-stone-800 transition-all ${qd.completed ? 'opacity-50' : ''}">
        <div class="flex gap-3 cursor-pointer group" onclick="dispatch('TOGGLE_QUEST', '${q.id}')">
          <i data-lucide="${qd.completed ? 'check-circle' : 'circle'}" class="w-4 h-4 mt-0.5 ${qd.completed ? 'text-stone-600' : 'text-amber-500'} shrink-0 group-hover:scale-110 transition-transform"></i>
          <div>
            <div class="text-sm font-bold tracking-wide ${qd.completed ? 'line-through text-stone-500' : 'text-stone-300'}">${q.title}</div>
            <div class="text-xs text-stone-500 mt-1">${q.desc}</div>
          </div>
        </div>
        <div class="pl-7 mt-3">
          ${subHtml}
          <div class="flex gap-2 mt-3">
            <input type="text" id="in-sq-${q.id}" onkeypress="if(event.key==='Enter'){ dispatch('ADD_SUBQUEST', {qId:'${q.id}', text:this.value}); this.value=''; }" class="w-full bg-stone-900 border border-stone-800 text-xs px-2.5 py-1.5 rounded text-stone-300 placeholder-stone-700 focus:outline-none focus:border-amber-700/50 transition-colors" placeholder="建立子防禦目標...">
            <button onclick="const el=document.getElementById('in-sq-${q.id}'); if(el.value){dispatch('ADD_SUBQUEST', {qId:'${q.id}', text:el.value}); el.value='';}" class="bg-stone-800 text-stone-400 px-2.5 rounded hover:text-amber-400 hover:bg-stone-700 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
    document.getElementById(containerId).innerHTML = html;
  };

  renderList('life', 'quests-life');
  renderList('invest', 'quests-invest');
  renderList('finance', 'quests-finance');

  lucide.createIcons();
}

// 匯入邏輯
document.getElementById('import-file').addEventListener('change', function(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try { state = JSON.parse(evt.target.result); dispatch('EXPORT_DATA'); alert("✅ 紀錄還原成功！"); closeSettings(); render(); } 
    catch(err) { alert('檔案格式錯誤。'); }
  };
  reader.readAsText(file);
});

// 啟動
const oathChecks = document.querySelectorAll('.oath-checkbox');
const btnTakeOath = document.getElementById('btn-take-oath');
oathChecks.forEach(cb => {
  cb.addEventListener('change', () => {
    const all = Array.from(oathChecks).every(c => c.checked);
    btnTakeOath.disabled = !all;
    btnTakeOath.className = all 
      ? 'w-full py-4 font-bold tracking-widest uppercase transition-all duration-300 rounded-lg shadow-lg bg-gradient-to-r from-amber-800 to-amber-600 text-amber-50 hover:from-amber-700 cursor-pointer animate-pop'
      : 'w-full py-4 font-bold tracking-widest uppercase transition-all duration-300 rounded-lg bg-stone-800/50 text-stone-600 border border-stone-800 cursor-not-allowed';
  });
});
btnTakeOath.addEventListener('click', () => dispatch('TAKE_OATH'));

dispatch('LOGIN_CHECK');
if (!state.meta.oathTaken) document.getElementById('oath-view').classList.remove('hidden');
else document.getElementById('dashboard-view').classList.remove('hidden');

</script>
</body>
</html>
